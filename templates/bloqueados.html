<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IPs Bloqueados</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: #1e293b;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #334155;
        }

        th {
            background: #0b1220;
        }

        tr:hover {
            background: #334155;
        }

        button {
            padding: 6px 10px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .desbloquear {
            background: #22c55e;
            color: white;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>

<div class="topbar">
    <h1>🔒 IPs Bloqueados</h1>
</div>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>IP</th>
            <th>Motivo</th>
            <th>Data</th>
            <th>Ação</th>
        </tr>
    </thead>

    <tbody>
        {% for ip in bloqueados %}
        <tr>
            <td>{{ ip.id }}</td>
            <td>{{ ip.ip }}</td>
            <td>{{ ip.motivo }}</td>
            <td>{{ ip.data }}</td>
            <td>
                <button class="desbloquear" onclick="desbloquear({{ ip.id }})">
                    Desbloquear
                </button>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script>
function desbloquear(id) {
    fetch("/desbloquear-ip/" + id, {
        method: "POST"
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        location.reload();
    })
    .catch(err => {
        alert("Erro ao desbloquear IP");
        console.log(err);
    });
}
</script>

</body>
</html>
