<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cozinet Shield - IPs Bloqueados</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
    --bg:#0b0b0b;
    --sidebar:#111111;
    --card:#171717;
    --border:#292929;
    --orange:#ff7a00;
    --orange2:#ff9333;
    --muted:#8f8f8f;
    --red:#dc2626;
    --green:#22c55e;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:white;
    font-family:Arial,sans-serif;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:280px;
    height:100vh;
    background:var(--sidebar);
    border-right:1px solid var(--border);
    padding:25px;
}

.logo{
    text-align:center;
    margin-bottom:35px;
}

.logo img{
    width:230px;
}

.sidebar a{
    display:block;
    text-decoration:none;
    color:#d1d5db;
    padding:14px;
    border-radius:14px;
    margin-bottom:10px;
    transition:.3s;
}

.sidebar a:hover{
    background:var(--orange);
    color:white;
}

/* CONTENT */
.content{
    margin-left:280px;
    padding:30px;
}

.topbar{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:15px;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.title{
    font-size:24px;
    font-weight:800;
}

.subtitle{
    color:var(--muted);
    font-size:13px;
}

.badge-total{
    background:var(--red);
    padding:10px 15px;
    border-radius:10px;
    font-size:14px;
    font-weight:700;
}

/* CARD */
.card-box{
    margin-top:20px;
    background:var(--card);
    border-radius:15px;
    border:1px solid var(--border);
    padding:20px;
}

/* TABLE */
.table{
    color:white;
}

.table thead{
    background:#0b1220;
}

.btn-desbloquear{
    background:var(--green);
    border:none;
    font-weight:600;
}

.btn-desbloquear:hover{
    background:#16a34a;
}

/* RESPONSIVO */
@media(max-width:991px){
    .sidebar{position:relative;width:100%;height:auto;}
    .content{margin-left:0;}
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        <img src="https://i.ibb.co/p6D813mT/Cozinet-1.png">
    </div>

    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/bloqueados">🚫 IPs Bloqueados</a>
    <a href="/ips-confiaveis">🟢 IPs Confiáveis</a>
    <a href="/logs">📜 Logs</a>
    <a href="/logout">🚪 Sair</a>

</div>

<!-- CONTENT -->
<div class="content">

    <div class="topbar">

        <div>
            <div class="title">🚫 IPs Bloqueados</div>
            <div class="subtitle">Gerenciamento de bloqueios do sistema</div>
        </div>

        <div class="badge-total">
            Total: {{ bloqueados|length if bloqueados else 0 }}
        </div>

    </div>

    <div class="card-box">

        <div class="table-responsive">

            <table class="table table-dark table-hover align-middle">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>IP</th>
                        <th>Motivo</th>
                        <th>Data</th>
                        <th>Ação</th>
                    </tr>
                </thead>

                <tbody>

                {% for ip in bloqueados %}

                    <tr>
                        <td>{{ ip.id }}</td>
                        <td><b>{{ ip.ip }}</b></td>
                        <td>{{ ip.motivo }}</td>
                        <td>{{ ip.data }}</td>
                        <td>
                            <button class="btn btn-desbloquear text-white"
                                onclick="desbloquear({{ ip.id }})">
                                🔓 Desbloquear
                            </button>
                        </td>
                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

function desbloquear(id){

    if(!confirm("Deseja desbloquear este IP?")) return;

    fetch("/desbloquear-ip/" + id,{
        method:"POST"
    })
    .then(r => r.json())
    .then(data => {
        alert(data.message);
        location.reload();
    })
    .catch(err => {
        alert("Erro ao desbloquear IP");
        console.log(err);
    });

}

</script>

</body>
</html>
