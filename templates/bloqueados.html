<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Eirilar Shield - IPs Bloqueados</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
    --bg:#f5f6fa;
    --card:#ffffff;
    --border:#e6e8ef;
    --red:#e11d48;
    --green:#16a34a;
    --muted:#6b7280;
}

body{
    background:var(--bg);
    font-family:Arial;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:260px;
    height:100vh;
    background:#fff;
    border-right:1px solid var(--border);
    padding:20px;
}

.sidebar img{
    width:180px;
    margin-bottom:20px;
}

.menu a{
    display:block;
    text-decoration:none;
    color:#333;
    padding:12px;
    border-radius:10px;
    margin-bottom:8px;
    font-weight:600;
}

.menu a:hover{
    background:var(--red);
    color:#fff;
}

/* CONTENT */
.content{
    margin-left:260px;
    padding:25px;
}

/* TOP */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.title{
    font-size:24px;
    font-weight:800;
}

.subtitle{
    font-size:13px;
    color:var(--muted);
}

/* CARD */
.card{
    background:#fff;
    border:1px solid var(--border);
    border-radius:12px;
    padding:15px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th{
    text-align:left;
    font-size:13px;
    color:#555;
    padding:10px;
    border-bottom:1px solid var(--border);
}

td{
    padding:10px;
    border-bottom:1px solid #f1f1f1;
    font-size:14px;
}

/* BADGE */
.badge{
    background:var(--red);
    color:white;
    padding:5px 10px;
    border-radius:8px;
    font-size:12px;
}

/* BUTTON */
.btn{
    background:var(--green);
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
    font-size:13px;
}

.btn:hover{
    opacity:0.9;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <img src="https://i.ibb.co/vxN1xS0R/logo-vermelho.png">

    <div class="menu">
        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/bloqueados">🚫 Bloqueados</a>
        <a href="/ips-confiaveis">🟢 Confiáveis</a>
        <a href="/logs">📜 Logs</a>
        <a href="/logout">🚪 Sair</a>
    </div>

</div>

<!-- CONTENT -->
<div class="content">

    <div class="topbar">
        <div>
            <div class="title">🚫 IPs Bloqueados</div>
            <div class="subtitle">Gerenciamento de bloqueios do sistema antifraude</div>
        </div>

        <div style="font-weight:700;color:#e11d48;">
            👤 {{ usuario }}
        </div>
    </div>

    <div class="card">

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>IP</th>
                    <th>Motivo</th>
                    <th>Data</th>
                    <th>Ação</th>
                </tr>
            </thead>

            <tbody>

            {% for b in bloqueados %}

                <tr>
                    <td>{{ b.id }}</td>
                    <td><span class="badge">{{ b.ip }}</span></td>
                    <td>{{ b.motivo }}</td>
                    <td>{{ b.data_bloqueio }}</td>
                    <td>
                        <button class="btn" onclick="desbloquear('{{ b.ip }}')">
                            Desbloquear
                        </button>
                    </td>
                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

<script>

function desbloquear(ip){
    fetch("/desbloquear-ip", {
        method:"POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ip})
    }).then(()=> location.reload());
}

</script>

</body>
</html>
