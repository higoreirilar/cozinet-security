<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cozinet Shield - IPs Bloqueados</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
    --bg:#0f172a;
    --card:#1e293b;
    --sidebar:#111827;
    --border:#334155;
    --red:#ef4444;
}

body{
    background:var(--bg);
    color:white;
    margin:0;
    font-family:Arial,sans-serif;
}

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:260px;
    height:100vh;
    background:var(--sidebar);
    border-right:1px solid var(--border);
    padding:20px;
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo img{
    width:190px;
}

.sidebar a{
    display:block;
    color:#cbd5e1;
    text-decoration:none;
    padding:12px;
    border-radius:10px;
    margin-bottom:8px;
}

.sidebar a:hover{
    background:#1e293b;
    color:white;
}

.content{
    margin-left:260px;
    padding:25px;
}

.topbar{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:15px;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.card-box{
    margin-top:20px;
    background:var(--card);
    border-radius:15px;
    border:1px solid var(--border);
    padding:20px;
}

.table{
    color:white;
}

.table thead{
    background:#0b1220;
}

.badge-total{
    background:var(--red);
    padding:10px 15px;
    border-radius:10px;
    font-size:14px;
}

.btn-desbloquear{
    background:#22c55e;
    border:none;
}

.btn-desbloquear:hover{
    background:#16a34a;
}

</style>

</head>

<body>

<div class="sidebar">

    <div class="logo">
        <img src="https://i.ibb.co/p6D813mT/Cozinet-1.png">
    </div>

    <a href="/dashboard">🏠 Dashboard</a>

    <a href="/bloqueados">🚫 IPs Bloqueados</a>

    <a href="/ips-confiaveis">🟢 IPs Confiáveis</a>

    <a href="/logs">📜 Logs</a>

    <a href="/logout">🚪 Sair</a>

</div>

<div class="content">

    <div class="topbar">

        <div>
            <h2>🚫 IPs Bloqueados</h2>
            <small>Lista de IPs bloqueados manualmente</small>
        </div>

        <div class="badge-total">
            Total: {{ bloqueados|length }}
        </div>

    </div>

    <div class="card-box">

        <div class="table-responsive">

            <table class="table table-dark table-hover align-middle">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>IP</th>
                        <th>Motivo</th>
                        <th>Data Bloqueio</th>
                        <th>Ação</th>
                    </tr>
                </thead>

                <tbody>

                {% for ip in bloqueados %}

                    <tr>

                        <td>{{ ip.id }}</td>

                        <td>
                            <strong>{{ ip.ip }}</strong>
                        </td>

                        <td>{{ ip.motivo }}</td>

                        <td>{{ ip.data }}</td>

                        <td>

                            <button
                                class="btn btn-desbloquear text-white"
                                onclick="desbloquear({{ ip.id }})">

                                🔓 Desbloquear

                            </button>

                        </td>

                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

function desbloquear(id){

    if(!confirm("Deseja desbloquear este IP?")){
        return;
    }

    fetch("/desbloquear-ip/" + id,{
        method:"POST"
    })
    .then(response => response.json())
    .then(data => {

        alert(data.message);

        location.reload();

    })
    .catch(error => {

        alert("Erro ao desbloquear IP");

        console.log(error);

    });

}

</script>

</body>
</html>
