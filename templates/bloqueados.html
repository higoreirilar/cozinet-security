<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IPs Bloqueados - Cozinet Shield</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
    --bg:#0b0b0b;
    --sidebar:#111111;
    --card:#171717;
    --border:#292929;
    --orange:#ff7a00;
    --muted:#8f8f8f;
}

body{
    background:var(--bg);
    color:white;
    font-family:Arial;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:280px;
    height:100vh;
    background:var(--sidebar);
    border-right:1px solid var(--border);
    padding:25px;
}

.logo{
    text-align:center;
    margin-bottom:35px;
}

.logo img{width:230px;}

.menu a{
    display:block;
    text-decoration:none;
    color:#d1d5db;
    padding:14px;
    border-radius:14px;
    margin-bottom:10px;
}

.menu a:hover{
    background:var(--orange);
    color:white;
}

/* CONTENT */
.content{
    margin-left:280px;
    padding:30px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.title{
    font-size:28px;
    font-weight:800;
}

.subtitle{
    color:var(--muted);
}

/* CARD */
.card-box{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
}

/* TABLE */
table{
    width:100%;
    color:white;
}

thead{
    background:#0f0f0f;
}

th, td{
    padding:12px;
    border-bottom:1px solid #2a2a2a;
}

.badge{
    padding:6px 10px;
    border-radius:10px;
    background:#dc2626;
    font-size:12px;
}

.btn-unblock{
    background:#22c55e;
    border:none;
    padding:6px 12px;
    border-radius:8px;
    color:white;
}

.btn-unblock:hover{
    background:#16a34a;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        <img src="https://i.ibb.co/p6D813mT/Cozinet-1.png">
    </div>

    <div class="menu">
        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/bloqueados">🚫 IPs Bloqueados</a>
        <a href="/ips-confiaveis">🟢 IPs Confiáveis</a>
        <a href="/logs">📜 Logs</a>
        <a href="/logout">🚪 Sair</a>
    </div>

</div>

<!-- CONTENT -->
<div class="content">

    <div class="topbar">
        <div>
            <div class="title">🚫 IPs Bloqueados</div>
            <div class="subtitle">Lista de IPs bloqueados manual e automaticamente</div>
        </div>
    </div>

    <div class="card-box">

        <div class="table-responsive">

            <table>

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>IP</th>
                        <th>Motivo</th>
                        <th>Data</th>
                        <th>Ação</th>
                    </tr>
                </thead>

                <tbody>

                {% for b in bloqueados %}

                    <tr>
                        <td>{{ b[0] }}</td>
                        <td><b>{{ b[1] }}</b></td>
                        <td>{{ b[2] }}</td>
                        <td>{{ b[3] }}</td>
                        <td>
                            <button class="btn-unblock" onclick="desbloquearIP('{{ b[1] }}')">
                                🔓 Desbloquear
                            </button>
                        </td>
                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

function desbloquearIP(ip){
    fetch("/desbloquear-ip",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({ip})
    }).then(()=>{
        location.reload();
    });
}

</script>

</body>
</html>
