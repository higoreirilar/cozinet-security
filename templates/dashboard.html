<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cozinet - Antifraude</title>

<style>
body {
    margin: 0;
    font-family: 'Arial';
    background: #0a0a0f;
    color: #fff;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 25px;
    background: #0f0f14;
    border-bottom: 2px solid #ff6a00;
    box-shadow: 0 0 15px rgba(255, 106, 0, 0.2);
}

.brand {
    display: flex;
    align-items: center;
    gap: 10px;
}

.brand img {
    width: 40px;
    height: 40px;
    filter: drop-shadow(0 0 8px #ff6a00);
}

.brand h2 {
    color: #ff6a00;
    margin: 0;
    letter-spacing: 1px;
}

/* CARDS */
.cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    padding: 20px;
}

.card {
    background: #12121a;
    border: 1px solid #1f1f2a;
    padding: 20px;
    border-radius: 14px;
    text-align: center;
    transition: 0.3s;
    position: relative;
    overflow: hidden;
}

.card:hover {
    transform: translateY(-6px);
    border-color: #ff6a00;
    box-shadow: 0 0 25px rgba(255, 106, 0, 0.25);
}

.card b {
    font-size: 24px;
    color: #ff6a00;
}

/* TABLE */
.table-container {
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #12121a;
    border-radius: 12px;
    overflow: hidden;
}

th {
    background: #0f0f14;
    color: #ff6a00;
    padding: 12px;
}

td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #1f1f2a;
}

/* BUTTONS */
button {
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

.block {
    background: #ff3b30;
    color: white;
}

.unblock {
    background: #ff6a00;
    color: black;
    font-weight: bold;
}

button:hover {
    transform: scale(1.08);
}

/* BACKGROUND EFFECT */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,106,0,0.08) 0%, transparent 60%);
    animation: move 12s linear infinite;
    z-index: -1;
}

@keyframes move {
    from { transform: translate(0,0); }
    to { transform: translate(-200px,-200px); }
}

/* TITLE EFFECT */
.title {
    text-align: center;
    padding: 10px;
    color: #ff6a00;
    font-size: 18px;
    opacity: 0.8;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">

    <div class="brand">
        <img src="/static/logo.png">
        <h2>COZINET</h2>
    </div>

    <div>
        👤 {{ usuario }}
    </div>

</div>

<div class="title">
    Painel Antifraude em tempo real
</div>

<!-- CARDS -->
<div class="cards">

    <div class="card">
        ✔ APROVADOS<br>
        <b>{{ aprovados }}</b>
    </div>

    <div class="card">
        ⏳ ANÁLISE<br>
        <b>{{ analise }}</b>
    </div>

    <div class="card">
        🚫 BLOQUEADOS<br>
        <b>{{ bloqueados }}</b>
    </div>

</div>

<!-- TABLE -->
<div class="table-container">
<table>

<tr>
    <th>ID</th>
    <th>Pedido</th>
    <th>IP</th>
    <th>Valor</th>
    <th>Status</th>
    <th>Motivo</th>
    <th>Ações</th>
</tr>

{% for p in pedidos %}

<tr>
    <td>{{ p.id }}</td>
    <td>{{ p.order_id }}</td>
    <td>{{ p.ip }}</td>
    <td>R$ {{ p.valor }}</td>
    <td>{{ p.status }}</td>
    <td>{{ p.motivo }}</td>
    <td>
        <button class="block" onclick="bloquear('{{ p.ip }}')">🚫 Bloquear</button>
        <button class="unblock" onclick="desbloquear('{{ p.ip }}')">🔓 Desbloquear</button>
    </td>
</tr>

{% endfor %}

</table>
</div>

<script>
function bloquear(ip){
    fetch("/bloquear-ip", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ip: ip})
    })
    .then(r => r.json())
    .then(data => {
        alert(data.message);
        location.reload();
    });
}

function desbloquear(ip){
    fetch("/desbloquear-ip", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ip: ip})
    })
    .then(r => r.json())
    .then(data => {
        alert(data.message);
        location.reload();
    });
}
</script>

</body>
</html>
