<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Eirilar Shield - IPs Confiáveis</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
    --bg:#f4f6fb;
    --card:#ffffff;
    --border:#e5e7eb;

    --red:#e11d48;
    --green:#16a34a;
    --yellow:#f59e0b;
    --blue:#2563eb;
}

body{
    background:var(--bg);
    font-family:Arial;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:260px;
    height:100vh;
    background:#fff;
    border-right:1px solid var(--border);
    padding:20px;
}

.sidebar img{
    width:180px;
    margin-bottom:20px;
}

.menu a{
    display:block;
    text-decoration:none;
    color:#333;
    padding:12px;
    border-radius:10px;
    margin-bottom:8px;
    font-weight:600;
}

.menu a:hover{
    background:var(--red);
    color:#fff;
}

/* CONTENT */
.content{
    margin-left:260px;
    padding:25px;
}

/* HEADER */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.title{
    font-size:24px;
    font-weight:900;
}

.subtitle{
    font-size:13px;
    color:#666;
}

/* CARD */
.card{
    background:#fff;
    border:1px solid var(--border);
    border-radius:14px;
    padding:20px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:12px;
    border-bottom:1px solid #eee;
    font-size:14px;
}

th{
    text-align:left;
    background:#fafafa;
    color:#444;
}

.badge-ip{
    background:var(--green);
    color:white;
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <img src="https://i.ibb.co/vxN1xS0R/logo-vermelho.png">

    <div class="menu">
        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/bloqueados">🚫 Bloqueados</a>
        <a href="/ips-confiaveis">🟢 Confiáveis</a>
        <a href="/logs">📜 Logs</a>
        <a href="/logout">🚪 Sair</a>
    </div>

</div>

<!-- CONTENT -->
<div class="content">

    <div class="topbar">
        <div>
            <div class="title">🟢 IPs Confiáveis</div>
            <div class="subtitle">IPs liberados no sistema antifraude</div>
        </div>

        <div style="font-weight:700;color:#16a34a;">
            👤 {{ usuario }}
        </div>
    </div>

    <div class="card">

        <table>

            <thead>
                <tr>
                    <th>ID</th>
                    <th>IP</th>
                    <th>Observação</th>
                    <th>Data</th>
                </tr>
            </thead>

            <tbody>

            {% for ip in ips %}
                <tr>
                    <td>{{ ip.id }}</td>
                    <td>
                        <span class="badge-ip">{{ ip.ip }}</span>
                    </td>
                    <td>{{ ip.observacao }}</td>
                    <td>{{ ip.data }}</td>
                </tr>
            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
