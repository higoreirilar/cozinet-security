<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IPs Confiáveis</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
    --bg:#0b0b0b;
    --sidebar:#111;
    --card:#171717;
    --border:#292929;
    --orange:#ff7a00;
    --green:#22c55e;
}

body{
    background:var(--bg);
    color:white;
    font-family:Arial;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:280px;
    height:100vh;
    background:var(--sidebar);
    border-right:1px solid var(--border);
    padding:25px;
}

.sidebar a{
    display:block;
    color:#d1d5db;
    text-decoration:none;
    padding:14px;
    border-radius:14px;
    margin-bottom:10px;
}

.sidebar a:hover{
    background:var(--orange);
    color:white;
}

/* CONTENT */
.content{
    margin-left:280px;
    padding:30px;
}

.topbar{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:15px;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.badge-total{
    background:var(--green);
    padding:10px 15px;
    border-radius:10px;
    font-weight:700;
}

/* CARD */
.card-box{
    margin-top:20px;
    background:var(--card);
    border-radius:15px;
    border:1px solid var(--border);
    padding:20px;
}

.table{
    color:white;
}

.table thead{
    background:#0b1220;
}

</style>

</head>

<body>

<div class="sidebar">

    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/bloqueados">🚫 IPs Bloqueados</a>
    <a href="/ips-confiaveis">🟢 IPs Confiáveis</a>
    <a href="/logs">📜 Logs</a>
    <a href="/logout">🚪 Sair</a>

</div>

<div class="content">

    <div class="topbar">

        <div>
            <h3>🟢 IPs Confiáveis</h3>
            <small>IPs liberados manualmente</small>
        </div>

        <div class="badge-total">
            Total: {{ dados|length if dados else 0 }}
        </div>

    </div>

    <div class="card-box">

        <table class="table table-dark table-hover align-middle">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>IP</th>
                    <th>Observação</th>
                    <th>Data</th>
                </tr>
            </thead>

            <tbody>

            {% for ip in dados %}
            <tr>
                <td>{{ ip.id }}</td>
                <td><b>{{ ip.ip }}</b></td>
                <td>{{ ip.observacao }}</td>
                <td>{{ ip.data }}</td>
            </tr>
            {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
