<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Cozinet Shield - IPs Confiáveis</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
    --bg:#0b0b0b;
    --sidebar:#111111;
    --card:#171717;
    --border:#292929;
    --orange:#ff7a00;
    --orange2:#ff9333;
    --muted:#8f8f8f;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:white;
    font-family:Arial;
}

/* SIDEBAR */
.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:280px;
    height:100vh;
    background:var(--sidebar);
    border-right:1px solid var(--border);
    padding:25px;
}

.logo{
    text-align:center;
    margin-bottom:35px;
}

.logo img{
    width:230px;
}

.menu a{
    display:block;
    text-decoration:none;
    color:#d1d5db;
    padding:14px;
    border-radius:14px;
    margin-bottom:10px;
}

.menu a:hover{
    background:var(--orange);
    color:white;
}

/* CONTENT */
.content{
    margin-left:280px;
    padding:30px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.title{
    font-size:30px;
    font-weight:800;
}

.subtitle{
    color:var(--muted);
}

.user-box{
    background:linear-gradient(135deg,var(--orange),var(--orange2));
    padding:12px 18px;
    border-radius:14px;
    font-weight:700;
}

/* CARD */
.card-box{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:20px;
    padding:20px;
}

/* TABLE */
.table{
    color:white;
}

.table thead{
    background:#0f0f0f;
}

.badge-ip{
    background:#22c55e;
    padding:6px 10px;
    border-radius:10px;
    font-size:12px;
    font-weight:700;
}

/* RESPONSIVO */
@media(max-width:991px){
    .sidebar{position:relative;width:100%;height:auto;}
    .content{margin-left:0;}
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        <img src="https://i.ibb.co/p6D813mT/Cozinet-1.png">
    </div>

    <div class="menu">
        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/bloqueados">🚫 IPs Bloqueados</a>
        <a href="/ips-confiaveis">🟢 IPs Confiáveis</a>
        <a href="/logs">📜 Logs</a>
        <a href="/logout">🚪 Sair</a>
    </div>

</div>

<!-- CONTENT -->
<div class="content">

    <div class="topbar">

        <div>
            <div class="title">🟢 IPs Confiáveis</div>
            <div class="subtitle">Lista de IPs liberados no sistema antifraude</div>
        </div>

        <div class="user-box">
            👤 {{ usuario }}
        </div>

    </div>

    <div class="card-box">

        <div class="table-responsive">

            <table class="table table-dark table-hover align-middle">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>IP</th>
                        <th>Observação</th>
                        <th>Data</th>
                    </tr>
                </thead>

                <tbody>

                {% for ip in ips %}

                    <tr>
                        <td>{{ ip.id }}</td>
                        <td>
                            <span class="badge-ip">{{ ip.ip }}</span>
                        </td>
                        <td>{{ ip.observacao }}</td>
                        <td>{{ ip.data }}</td>
                    </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
