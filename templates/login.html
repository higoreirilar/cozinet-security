<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Eirilar Shield - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
    --bg:#f4f6fb;
    --card:#ffffff;
    --border:#e5e7eb;

    --red:#e11d48;
    --green:#16a34a;
    --yellow:#f59e0b;
    --blue:#2563eb;
}

body{
    background:var(--bg);
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* CARD LOGIN */
.login-card{
    width:100%;
    max-width:420px;
    background:#fff;
    border:1px solid var(--border);
    border-radius:18px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* LOGO */
.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo img{
    width:160px;
}

/* TITULO */
.title{
    text-align:center;
    font-size:20px;
    font-weight:900;
    margin-bottom:5px;
    color:#111;
}

.subtitle{
    text-align:center;
    font-size:13px;
    color:#666;
    margin-bottom:25px;
}

/* INPUTS */
label{
    font-size:13px;
    color:#444;
    margin-bottom:6px;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid var(--border);
    outline:none;
    margin-bottom:15px;
    transition:0.2s;
}

input:focus{
    border-color:var(--red);
}

/* BOTÃO */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--red);
    color:white;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#be123c;
}

/* ERRO */
.error{
    background:#fee2e2;
    color:#b91c1c;
    padding:10px;
    border-radius:10px;
    font-size:13px;
    margin-bottom:15px;
    text-align:center;
}

/* FOOTER */
.footer{
    text-align:center;
    font-size:11px;
    color:#888;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        <img src="https://i.ibb.co/vxN1xS0R/logo-vermelho.png">
    </div>

    <div class="title">Eirilar Shield</div>
    <div class="subtitle">Acesso ao painel antifraude</div>

    {% if erro %}
    <div class="error">
        {{ erro }}
    </div>
    {% endif %}

    <form method="POST">

        <label>Email</label>
        <input type="email" name="email" placeholder="Digite seu email" required>

        <label>Senha</label>
        <input type="password" name="senha" placeholder="Digite sua senha" required>

        <button type="submit">Entrar</button>

    </form>

    <div class="footer">
        © 2026 Eirilar Shield • Sistema de proteção antifraude
    </div>

</div>

</body>
</html>
