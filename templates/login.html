<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Cozinet SAC</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0b0f;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #15151c;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 0 20px rgba(255,106,0,0.3);
        }

        h2 {
            text-align: center;
            color: #ff6a00;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 6px;
            background: #111117;
            color: white;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #ff6a00;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #ff7f1a;
        }

        .msg {
            text-align: center;
            color: red;
            margin-bottom: 10px;
        }

        .logo {
            text-align: center;
            margin-bottom: 15px;
        }

        .logo img {
            width: 90px;
        }
    </style>
</head>

<body>

<div class="box">

    <div class="logo">
        <img src="https://i.ibb.co/p6D813mT/Cozinet-1.png">
    </div>

    <h2>PAINEL SAC</h2>

    {% if erro %}
    <div class="msg">{{ erro }}</div>
    {% endif %}

    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="senha" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>

</div>

</body>
</html>
