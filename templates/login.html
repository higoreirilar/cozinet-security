<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Eirilar Shield - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

:root{
    --bg:#f5f6fa;
    --card:#ffffff;
    --border:#e6e8ef;
    --red:#e11d48;
    --muted:#6b7280;
}

body{
    background:var(--bg);
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.login-box{
    width:100%;
    max-width:420px;
    background:#fff;
    border:1px solid var(--border);
    border-radius:16px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* LOGO */
.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo img{
    width:160px;
}

/* TITLE */
h2{
    text-align:center;
    font-size:22px;
    margin-bottom:5px;
    font-weight:800;
}

.subtitle{
    text-align:center;
    font-size:13px;
    color:var(--muted);
    margin-bottom:25px;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid var(--border);
    border-radius:10px;
    outline:none;
}

input:focus{
    border-color:var(--red);
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:var(--red);
    color:white;
    border:none;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

/* ERROR */
.error{
    background:#fee2e2;
    color:#b91c1c;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
    text-align:center;
    font-size:13px;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:var(--muted);
}

</style>
</head>

<body>

<div class="login-box">

    <div class="logo">
        <img src="https://i.ibb.co/vxN1xS0R/logo-vermelho.png">
    </div>

    <h2>Eirilar Shield</h2>
    <div class="subtitle">Painel antifraude seguro</div>

    {% if erro %}
    <div class="error">
        {{ erro }}
    </div>
    {% endif %}

    <form method="POST">

        <input type="email" name="email" placeholder="E-mail" required>

        <input type="password" name="senha" placeholder="Senha" required>

        <button type="submit">Entrar</button>

    </form>

    <div class="footer">
        Sistema antifraude © 2026
    </div>

</div>

</body>
</html>
