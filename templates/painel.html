<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antifraude Painel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0f;
    color: white;
}

/* HEADER MELHORADO */
header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: #111117;
    border-bottom: 1px solid #ff6a00;
}

header img {
    width: 70px; /* 🔥 AUMENTADO */
    height: auto;
}

header h1 {
    font-size: 18px;
    margin: 0;
    color: #ff6a00;
}

/* MINI PAINEL STATUS (MAIOR E MAIS LEGÍVEL) */
.stats {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    gap: 10px;
}

.box {
    background: #15151c;
    padding: 10px 14px;  /* 🔥 AUMENTADO */
    border-radius: 10px;
    border: 1px solid #2a2a2a;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 90px;
    justify-content: center;
}

/* BOLINHAS MAIORES */
.dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
}

.green { background: #2cff7a; }
.yellow { background: #ffb100; }
.red { background: #ff3b3b; }

/* TABELA */
.container {
    padding: 15px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #15151c;
    border-radius: 10px;
    overflow: hidden;
    font-size: 13px;
}

th {
    background: #111117;
    color: #ff6a00;
    padding: 10px;
    text-align: left;
}

td {
    padding: 10px;
    border-bottom: 1px solid #222;
}

tr:hover {
    background: #1c1c25;
}

/* STATUS */
.aprovado { color: #2cff7a; font-weight: bold; }
.analise { color: #ffb100; font-weight: bold; }
.bloqueado { color: #ff3b3b; font-weight: bold; }

/* INFO BAR SIMPLES (NOVO EXTRA LEVE) */
.info {
    padding: 10px 15px;
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<header>
    <img src="https://i.ibb.co/p6D813mT/Cozinet-1.png">
    <h1>PAINEL ANTIFRAUDE</h1>
</header>

<!-- STATUS MAIOR E MAIS VISÍVEL -->
<div class="stats">

    <div class="box">
        <span class="dot green"></span>
        <span id="aprovados">0</span>
    </div>

    <div class="box">
        <span class="dot yellow"></span>
        <span id="analise">0</span>
    </div>

    <div class="box">
        <span class="dot red"></span>
        <span id="bloqueados">0</span>
    </div>

</div>

<!-- INFO EXTRA (NADA EXTRAVAGANTE) -->
<div class="info">
    Monitoramento em tempo real • Atualização automática a cada 3s
</div>

<!-- TABELA -->
<div class="container">
<table>
<tr>
    <th>ID</th>
    <th>Pedido</th>
    <th>IP</th>
    <th>Valor</th>
    <th>Status</th>
    <th>Motivos</th>
    <th>Data</th>
</tr>

<tbody id="tabela"></tbody>
</table>
</div>

<script>
async function atualizar(){
    const res = await fetch("/dashboard");
    const dados = await res.json();

    let a=0,b=0,c=0;
    let html="";

    dados.forEach(d => {

        if(d.status === "aprovado") a++;
        if(d.status === "analise") b++;
        if(d.status === "bloqueado") c++;

        html += `
        <tr>
            <td>${d.id}</td>
            <td>${d.order_id}</td>
            <td>${d.ip}</td>
            <td>R$ ${d.valor}</td>
            <td class="${d.status}">${d.status}</td>
            <td>${d.motivos}</td>
            <td>${d.created_at}</td>
        </tr>`;
    });

    document.getElementById("tabela").innerHTML = html;

    document.getElementById("aprovados").innerText = a;
    document.getElementById("analise").innerText = b;
    document.getElementById("bloqueados").innerText = c;
}

setInterval(atualizar,3000);
atualizar();
</script>

</body>
</html>
