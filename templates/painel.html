<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cozinet Shield</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#0b0b0b;
    color:#fff;
}

.container{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:270px;
    background:#111;
    border-right:1px solid #232323;
    padding:25px;
}

.logo{
    text-align:center;
    margin-bottom:40px;
}

.logo img{
    width:180px;
    display:block;
    margin:auto;
    margin-bottom:10px;
}

.logo h1{
    font-size:28px;
    font-weight:800;
}

.logo span{
    color:#ff7a00;
    letter-spacing:4px;
    font-size:13px;
    font-weight:700;
}

.menu{
    list-style:none;
}

.menu li{
    background:#171717;
    padding:15px;
    border-radius:14px;
    margin-bottom:10px;
    color:#bdbdbd;
    cursor:pointer;
    transition:.3s;
}

.menu li:hover{
    background:#1f1f1f;
}

.menu li.active{
    border-left:4px solid #ff7a00;
    color:#fff;
}

/* MAIN */

.main{
    flex:1;
    padding:25px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.title h2{
    font-size:32px;
    font-weight:800;
}

.title p{
    color:#777;
}

.user-box{
    display:flex;
    align-items:center;
    gap:15px;
}

.user{
    background:#171717;
    border:1px solid #252525;
    padding:12px 18px;
    border-radius:12px;
}

.logout{
    background:#ff7a00;
    color:white;
    text-decoration:none;
    padding:12px 18px;
    border-radius:12px;
    font-weight:600;
}

/* CARDS */

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:16px;
    margin-bottom:20px;
}

.card{
    background:#151515;
    border:1px solid #252525;
    border-radius:18px;
    padding:20px;
    transition:.3s;
}

.card:hover{
    border-color:#ff7a00;
}

.card p{
    color:#888;
    font-size:13px;
}

.card h3{
    font-size:34px;
    margin-top:10px;
    font-weight:800;
}

.green{
    border-left:4px solid #22c55e;
}

.yellow{
    border-left:4px solid #f59e0b;
}

.red{
    border-left:4px solid #ef4444;
}

/* GRÁFICO */

.chart-box{
    background:#151515;
    border:1px solid #252525;
    border-radius:18px;
    padding:18px;
    margin-bottom:20px;
}

.chart-box h3{
    margin-bottom:10px;
    font-size:15px;
}

/* TABELA */

.table-box{
    background:#151515;
    border:1px solid #252525;
    border-radius:18px;
    overflow:hidden;
}

.table-header{
    padding:20px;
    border-bottom:1px solid #252525;
}

.table-header h3{
    color:#ff7a00;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1d1d1d;
    color:#ff7a00;
    text-align:left;
    padding:14px;
    font-size:13px;
}

td{
    padding:14px;
    border-bottom:1px solid #222;
}

tr:hover{
    background:#1a1a1a;
}

.status{
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:600;
}

.aprovado{
    background:rgba(34,197,94,.15);
    color:#22c55e;
}

.analise{
    background:rgba(245,158,11,.15);
    color:#f59e0b;
}

.bloqueado{
    background:rgba(239,68,68,.15);
    color:#ef4444;
}

@media(max-width:1200px){

.sidebar{
    display:none;
}

.stats{
    grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">
<img src="https://i.ibb.co/p6D813mT/Cozinet-1.png">
</div>

<ul class="menu">
<li class="active">Dashboard</li>
<li>Pedidos</li>
<li>Análises</li>
<li>Bloqueados</li>
<li>Logs</li>
<li>Configurações</li>
</ul>

</div>

<div class="main">

    <script>

/* MENU */

document
.querySelectorAll('.menu li')
.forEach(item => {

    item.addEventListener('click', () => {

        document
        .querySelectorAll('.menu li')
        .forEach(i => i.classList.remove('active'));

        item.classList.add('active');

    });

});

/* STATS */

async function carregarStats(){

    try{

        const response =
            await fetch('/stats');

        const stats =
            await response.json();

        document
            .getElementById('aprovados')
            .innerText =
            stats.aprovados || 0;

        document
            .getElementById('analise')
            .innerText =
            stats.analise || 0;

        document
            .getElementById('bloqueados')
            .innerText =
            stats.bloqueados || 0;

    }catch(err){

        console.log(err);

    }

}

/* PEDIDOS */

async function carregarPedidos(){

    try{

        const response =
            await fetch('/dashboard');

        const pedidos =
            await response.json();

        const tbody =
            document.getElementById(
                'tabelaPedidos'
            );

        tbody.innerHTML = '';

        pedidos.forEach(pedido => {

            let classe = 'analise';

            if(pedido.status === 'aprovado'){
                classe = 'aprovado';
            }

            if(pedido.status === 'bloqueado'){
                classe = 'bloqueado';
            }

            tbody.innerHTML += `
            <tr>

                <td>${pedido.id}</td>

                <td>${pedido.order_id}</td>

                <td>
                    ${pedido.ip || '-'}
                </td>

                <td>
                    R$ ${Number(
                        pedido.valor
                    ).toFixed(2)}
                </td>

                <td>
                    <span class="status ${classe}">
                        ${pedido.status}
                    </span>
                </td>

                <td>
                    ${pedido.motivo || ''}
                </td>

                <td>
                    ${pedido.created_at || ''}
                </td>

            </tr>
            `;
        });

    }catch(err){

        console.log(err);

    }

}

/* INICIALIZAÇÃO */

async function atualizarPainel(){

    await carregarStats();
    await carregarPedidos();

}

atualizarPainel();

setInterval(
    atualizarPainel,
    10000
);

/* GRÁFICO PEQUENO */

document.getElementById(

);

        }]

    },

    options:{

        responsive:true,

        plugins:{
            legend:{
                display:false
            }
        },

        scales:{

            x:{
                ticks:{
                    color:'#777'
                },
                grid:{
                    color:'#222'
                }
            },

            y:{
                ticks:{
                    color:'#777'
                },
                grid:{
                    color:'#222'
                }
            }

        }

    }

});

</script>
