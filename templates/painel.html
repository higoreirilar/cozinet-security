<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Antifraude PRO</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0b0f;
            color: white;
        }

        header {
            background: #111117;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #ff6a00;
        }

        header h1 {
            margin: 0;
            color: #ff6a00;
            font-size: 22px;
        }

        .container {
            padding: 20px;
        }

        /* CARDS */
        .cards {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: #15151c;
            padding: 15px 25px;
            border-radius: 10px;
            min-width: 150px;
            text-align: center;
            border: 1px solid #222;
        }

        .card h3 {
            margin: 0;
            font-size: 14px;
        }

        .card p {
            font-size: 22px;
            margin: 10px 0 0;
        }

        .green { color: #2cff7a; }
        .yellow { color: #ffb100; }
        .red { color: #ff3b3b; }

        /* TABELA */
        table {
            width: 100%;
            border-collapse: collapse;
            background: #15151c;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #111117;
            color: #ff6a00;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #222;
        }

        tr:hover {
            background: #1c1c25;
        }

        .bloqueado { color: #ff3b3b; font-weight: bold; }
        .analise { color: #ffb100; font-weight: bold; }
        .aprovado { color: #2cff7a; font-weight: bold; }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }

        /* GRÁFICO */
        .chart-box {
            background: #15151c;
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>🛡️ PAINEL ANTIFRAUDE PRO - COZINET</h1>
</header>

<div class="container">

    <!-- CARDS -->
    <div class="cards">
        <div class="card">
            <h3 class="green">Aprovados</h3>
            <p id="aprovados">0</p>
        </div>

        <div class="card">
            <h3 class="yellow">Análise</h3>
            <p id="analise">0</p>
        </div>

        <div class="card">
            <h3 class="red">Bloqueados</h3>
            <p id="bloqueados">0</p>
        </div>
    </div>

    <!-- GRAFICO -->
    <div class="chart-box">
        <canvas id="grafico"></canvas>
    </div>

    <!-- TABELA -->
    <table>
        <tr>
            <th>ID</th>
            <th>Pedido</th>
            <th>IP</th>
            <th>Valor</th>
            <th>Status</th>
            <th>Motivos</th>
        </tr>

        {% for r in dados %}
        <tr>
            <td>{{ r[0] }}</td>
            <td>{{ r[1] }}</td>
            <td>{{ r[2] }}</td>
            <td>R$ {{ r[3] }}</td>
            <td class="{{ r[4] }}">{{ r[4] }}</td>
            <td>{{ r[5] }}</td>
        </tr>
        {% endfor %}
    </table>

</div>

<!-- SOM ALERTA -->
<audio id="alerta">
    <source src="https://www.myinstants.com/media/sounds/alarm.mp3" type="audio/mpeg">
</audio>

<script>
let grafico;

let ultimoTamanho = 0;

async function atualizar() {
    const res = await fetch("/dashboard");
    const dados = await res.json();

    let aprovados = 0;
    let analise = 0;
    let bloqueados = 0;

    const tbody = document.getElementById("tabela");
    tbody.innerHTML = "";

    dados.forEach(item => {

        if (item.status === "aprovado") aprovados++;
        else if (item.status === "analise") analise++;
        else if (item.status === "bloqueado") bloqueados++;

        tbody.innerHTML += `
        <tr>
            <td>${item.id}</td>
            <td>${item.order_id}</td>
            <td>${item.ip}</td>
            <td>R$ ${item.valor}</td>
            <td class="${item.status}">${item.status}</td>
            <td>${item.motivos}</td>
        </tr>`;
    });

    document.getElementById("aprovados").innerText = aprovados;
    document.getElementById("analise").innerText = analise;
    document.getElementById("bloqueados").innerText = bloqueados;

    atualizarGrafico(aprovados, analise, bloqueados);

    // 🔊 SÓ TOCA SE APARECER NOVO BLOQUEADO
    if (bloqueados > ultimoTamanho) {
        document.getElementById("alerta").play();
    }

    ultimoTamanho = bloqueados;
}

function atualizarGrafico(a, b, c) {
    if (!grafico) {
        grafico = new Chart(document.getElementById("grafico"), {
            type: 'bar',
            data: {
                labels: ['Aprovados', 'Análise', 'Bloqueados'],
                datasets: [{
                    data: [a, b, c],
                    backgroundColor: ['#2cff7a', '#ffb100', '#ff3b3b']
                }]
            }
        });
    } else {
        grafico.data.datasets[0].data = [a, b, c];
        grafico.update();
    }
}

setInterval(atualizar, 3000);
atualizar();
</script>

</body>
</html>
