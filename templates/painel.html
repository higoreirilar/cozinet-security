<!DOCTYPE html>
<html>
<head>
    <title>Painel Antifraude</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #334155;
            text-align: left;
        }

        th {
            color: #94a3b8;
        }

        .bloqueado {
            color: red;
            font-weight: bold;
        }

        .ok {
            color: lime;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🛡️ Painel Antifraude</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Pedido</th>
        <th>IP</th>
        <th>Valor</th>
        <th>Status</th>
        <th>Motivos</th>
    </tr>

    {% for r in dados %}
    <tr>
        <td>{{ r[0] }}</td>
        <td>{{ r[1] }}</td>
        <td>{{ r[2] }}</td>
        <td>R$ {{ r[3] }}</td>

        <td class="{{ 'bloqueado' if r[4]=='bloqueado' else 'ok' }}">
            {{ r[4] }}
        </td>

        <td>{{ r[5] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
