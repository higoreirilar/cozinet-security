<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozinet Antifraude</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a; /* preto profundo */
    color: #fff;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: #111214; /* cinza escuro */
    height: 100vh;
    padding: 18px;
    border-right: 1px solid #222;
}

/* LOGO */
.logo {
    text-align: center;
    padding-bottom: 15px;
    border-bottom: 1px solid #222;
}

.logo img {
    width: 110px; /* emblema maior */
}

.logo h2 {
    font-size: 14px;
    margin-top: 8px;
    color: #ff6a00;
    letter-spacing: 1px;
}

/* MENU */
.menu {
    margin-top: 20px;
    font-size: 13px;
    color: #aaa;
}

.menu div {
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

.menu div:hover {
    background: #1c1c1f;
    color: #ff6a00;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

.header h1 {
    font-size: 16px;
    color: #ff6a00;
}

/* STATS */
.stats {
    display: flex;
    gap: 10px;
}

.card {
    background: #15161a;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid #222;
    font-size: 12px;
    min-width: 110px;
}

/* BOLINHAS */
.dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
}

.green { background: #2cff7a; }
.yellow { background: #ffb100; }
.red { background: #ff3b3b; }

/* TABELA */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
    background: #15161a;
    border-radius: 10px;
    overflow: hidden;
    font-size: 13px;
}

th {
    background: #111214;
    color: #ff6a00;
    text-align: left;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #222;
}

tr:hover {
    background: #1c1c1f;
}

/* STATUS */
.aprovado { color: #2cff7a; font-weight: bold; }
.analise { color: #ffb100; font-weight: bold; }
.bloqueado { color: #ff3b3b; font-weight: bold; }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        <img src="https://i.ibb.co/p6D813mT/Cozinet-1.png">
        <h2>COZINET</h2>
    </div>

    <div class="menu">
        <div>📊 Dashboard</div>
        <div>🧾 Pedidos</div>
        <div>🚨 Fraudes</div>
        <div>⚙️ Configurações</div>
    </div>

</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        <h1>Painel Antifraude</h1>

        <div class="stats">
            <div class="card"><span class="dot green"></span> <span id="aprovados">0</span></div>
            <div class="card"><span class="dot yellow"></span> <span id="analise">0</span></div>
            <div class="card"><span class="dot red"></span> <span id="bloqueados">0</span></div>
        </div>
    </div>

    <!-- TABELA -->
    <table>
        <tr>
            <th>ID</th>
            <th>Pedido</th>
            <th>IP</th>
            <th>Valor</th>
            <th>Status</th>
            <th>Motivos</th>
            <th>Data / Hora</th>
        </tr>

        <tbody id="tabela"></tbody>
    </table>

</div>

<script>
async function atualizar(){
    const res = await fetch("/dashboard");
    const dados = await res.json();

    let a=0,b=0,c=0;
    let html="";

    dados.forEach(d => {

        if(d.status === "aprovado") a++;
        if(d.status === "analise") b++;
        if(d.status === "bloqueado") c++;

        html += `
        <tr>
            <td>${d.id}</td>
            <td>${d.order_id}</td>
            <td>${d.ip}</td>
            <td>R$ ${d.valor}</td>
            <td class="${d.status}">${d.status}</td>
            <td>${d.motivos}</td>
            <td>${d.created_at}</td>
        </tr>`;
    });

    document.getElementById("tabela").innerHTML = html;

    document.getElementById("aprovados").innerText = a;
    document.getElementById("analise").innerText = b;
    document.getElementById("bloqueados").innerText = c;
}

setInterval(atualizar, 3000);
atualizar();
</script>

</body>
</html>
