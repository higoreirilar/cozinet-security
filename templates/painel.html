<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Antifraude</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b0f;
    color: white;
}

/* HEADER */
header {
    background: #111117;
    padding: 20px;
    text-align: center;
    border-bottom: 2px solid #ff6a00;
}

header img {
    width: 140px;
    margin-bottom: 10px;
}

header h1 {
    margin: 0;
    color: #ff6a00;
    font-size: 20px;
    letter-spacing: 1px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 20px;
}

.card {
    background: #15151c;
    padding: 15px 25px;
    border-radius: 12px;
    border: 1px solid #222;
    text-align: center;
    min-width: 120px;
}

.card h3 {
    margin: 0;
    font-size: 14px;
}

.card p {
    font-size: 22px;
    margin: 5px 0 0 0;
}

/* CORES */
.aprovado { color: #2cff7a; }
.analise { color: #ffb100; }
.bloqueado { color: #ff3b3b; }

/* TABLE */
.container {
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 25px;
    background: #15151c;
    border-radius: 10px;
    overflow: hidden;
}

th {
    background: #111117;
    color: #ff6a00;
    padding: 12px;
    text-align: left;
}

td {
    padding: 12px;
    border-bottom: 1px solid #222;
}

tr:hover {
    background: #1c1c25;
}

/* BADGE */
.badge {
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 11px;
    background: #ff6a00;
    color: black;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <img src="https://i.ibb.co/p6D813mT/Cozinet-1.png">
    <h1></h1>
</header>

<!-- CARDS -->
<div class="cards">

    <div class="card">
        <h3 style="color:#2cff7a;">Aprovados</h3>
        <p id="aprovados">0</p>
    </div>

    <div class="card">
        <h3 style="color:#ffb100;">Análise</h3>
        <p id="analise">0</p>
    </div>

    <div class="card">
        <h3 style="color:#ff3b3b;">Bloqueados</h3>
        <p id="bloqueados">0</p>
    </div>

</div>

<!-- TABELA -->
<div class="container">

<table>
    <tr>
        <th>ID</th>
        <th>Pedido</th>
        <th>IP</th>
        <th>Valor</th>
        <th>Status</th>
        <th>Motivos</th>
        <th>Data / Hora</th>
    </tr>

    {% for r in dados %}
    <tr>
        <td>{{ r[0] }}</td>
        <td>{{ r[1] }}</td>
        <td>{{ r[2] }}</td>
        <td>R$ {{ r[3] }}</td>
        <td class="{{ r[4] }}">{{ r[4] }}</td>
        <td>{{ r[5] }}</td>
        <td>{{ r[6] }}</td>
    </tr>
    {% endfor %}

</table>

</div>

<!-- SCRIPT CONTADOR -->
<script>
async function atualizar() {
    const res = await fetch("/dashboard");
    const dados = await res.json();

    let aprovados = 0;
    let analise = 0;
    let bloqueados = 0;

    dados.forEach(item => {
        if (item.status === "aprovado") aprovados++;
        else if (item.status === "analise") analise++;
        else if (item.status === "bloqueado") bloqueados++;
    });

    document.getElementById("aprovados").innerText = aprovados;
    document.getElementById("analise").innerText = analise;
    document.getElementById("bloqueados").innerText = bloqueados;
}

setInterval(atualizar, 3000);
atualizar();
</script>

</body>
</html>
