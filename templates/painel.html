<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cozinet Shield</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#0b0b0b;
    color:white;
}

.container{
    display:flex;
    min-height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:280px;
    background:#111;
    border-right:1px solid #222;
    padding:30px;
}

.logo{
    text-align:center;
    margin-bottom:50px;
}

.logo img{
    width:180px;
    margin-bottom:15px;
}

.logo h1{
    font-size:28px;
    font-weight:800;
}

.logo span{
    color:#ff7a00;
    letter-spacing:4px;
    font-weight:700;
}

.menu{
    list-style:none;
}

.menu li{
    padding:14px;
    margin-bottom:8px;
    border-radius:12px;
    background:#151515;
    color:#bbb;
}

.menu li.active{
    border-left:4px solid #ff7a00;
    color:white;
}

/* MAIN */

.main{
    flex:1;
    padding:30px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.user{
    display:flex;
    gap:15px;
    align-items:center;
}

.logout{
    background:#ff7a00;
    border:none;
    color:white;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
}

/* CARDS */

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    margin-bottom:25px;
}

.card{
    background:#151515;
    border:1px solid #252525;
    border-radius:22px;
    padding:25px;
}

.card p{
    color:#888;
}

.card h3{
    font-size:42px;
    margin-top:10px;
}

.approved{
    border-left:4px solid #22c55e;
}

.analysis{
    border-left:4px solid #f59e0b;
}

.blocked{
    border-left:4px solid #ef4444;
}

/* GRID */

.dashboard-grid{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    margin-bottom:20px;
}

.panel{
    background:#151515;
    border:1px solid #252525;
    border-radius:22px;
    padding:25px;
}

.panel h3{
    margin-bottom:20px;
}

/* TABLE */

.table-box{
    background:#151515;
    border-radius:22px;
    overflow:hidden;
    border:1px solid #252525;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#1d1d1d;
    color:#ff7a00;
    text-align:left;
    padding:16px;
}

td{
    padding:16px;
    border-bottom:1px solid #222;
}

.status{
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:600;
}

.aprovado{
    background:rgba(34,197,94,.15);
    color:#22c55e;
}

.analise{
    background:rgba(245,158,11,.15);
    color:#f59e0b;
}

.bloqueado{
    background:rgba(239,68,68,.15);
    color:#ef4444;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">
<img src="https://i.ibb.co/p6D813mT/Cozinet-1.png">
<h1>COZINET</h1>
<span>SHIELD</span>
</div>

<ul class="menu">
<li class="active">Dashboard</li>
<li>Pedidos</li>
<li>Análises</li>
<li>Bloqueados</li>
<li>Logs</li>
<li>Configurações</li>
</ul>

</div>

<div class="main">

<div class="topbar">

<div>
<h1>Cozinet Shield</h1>
<p style="color:#777">Monitoramento antifraude em tempo real</p>
</div>

<div class="user">
<span>👤 Admin</span>
<button class="logout">Sair</button>
</div>

</div>

<div class="stats">

<div class="card approved">
<p>Aprovados</p>
<h3 id="aprovados">0</h3>
</div>

<div class="card analysis">
<p>Em Análise</p>
<h3 id="analise">0</h3>
</div>

<div class="card blocked">
<p>Bloqueados</p>
<h3 id="bloqueados">0</h3>
</div>

</div>

<div class="dashboard-grid">

<div class="panel">
<h3>Evolução dos Pedidos</h3>
<canvas id="graficoPedidos"></canvas>
</div>

<div class="panel">
<h3>Distribuição de Risco</h3>
<canvas id="graficoRisco"></canvas>
</div>

</div>

<div class="table-box">

<table>

<thead>
<tr>
<th>ID</th>
<th>Pedido</th>
<th>IP</th>
<th>Valor</th>
<th>Status</th>
<th>Motivos</th>
<th>Data</th>
</tr>
</thead>

<tbody id="tabelaPedidos"></tbody>

</table>

</div>

</div>

</div>

<script>

async function carregarDashboard(){

    const response = await fetch('/dashboard');
    const dados = await response.json();

    document.getElementById('aprovados').textContent =
        dados.aprovados;

    document.getElementById('analise').textContent =
        dados.analise;

    document.getElementById('bloqueados').textContent =
        dados.bloqueados;

    const tbody =
        document.getElementById('tabelaPedidos');

    tbody.innerHTML='';

    dados.pedidos.forEach(p => {

        const statusClass =
            p[4] === 'aprovado'
            ? 'aprovado'
            : p[4] === 'analise'
            ? 'analise'
            : 'bloqueado';

        tbody.innerHTML += `
        <tr>
            <td>${p[0]}</td>
            <td>${p[1]}</td>
            <td>${p[2]}</td>
            <td>R$ ${p[3]}</td>
            <td><span class="status ${statusClass}">${p[4]}</span></td>
            <td>${p[5] || ''}</td>
            <td>${p[6] || ''}</td>
        </tr>`;
    });

}

carregarDashboard();
setInterval(carregarDashboard,10000);

new Chart(
document.getElementById('graficoPedidos'),
{
type:'line',
data:{
labels:['Seg','Ter','Qua','Qui','Sex','Sab','Dom'],
datasets:[{
data:[15,20,28,18,35,40,31],
borderColor:'#ff7a00',
backgroundColor:'rgba(255,122,0,.15)',
fill:true,
tension:.4
}]
},
options:{
plugins:{legend:{display:false}}
}
});

new Chart(
document.getElementById('graficoRisco'),
{
type:'doughnut',
data:{
labels:['Baixo','Médio','Alto'],
datasets:[{
data:[70,20,10]
}]
}
});

</script>

</body>
</html>
