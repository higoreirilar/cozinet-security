<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cozinet SaaS</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0a0a0a;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: #111214;
    height: 100vh;
    padding: 18px;
    border-right: 1px solid #222;
}

.logo img {
    width: 140px;
}

.menu div {
    padding: 10px;
    cursor: pointer;
    border-radius: 6px;
    color: #aaa;
}

.menu div:hover {
    background: #1c1c1f;
    color: #ff6a00;
}

/* MAIN */
.main {
    flex: 1;
    padding: 18px;
}

/* VIEWS */
.view {
    display: none;
}

.active {
    display: block;
}

/* CARDS */
.card {
    background: #15161a;
    padding: 10px;
    border-radius: 8px;
    display: inline-block;
    margin-right: 10px;
    border: 1px solid #222;
}

h2 {
    color: #ff6a00;
}

/* TABELA */
table {
    width: 100%;
    border-collapse: collapse;
    background: #15161a;
    margin-top: 10px;
}

th {
    background: #111214;
    color: #ff6a00;
    text-align: left;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #222;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="logo">
        <img src="https://i.ibb.co/p6D813mT/Cozinet-1.png">
    </div>

    <div class="menu">
        <div onclick="show('dashboard')">📊 Dashboard</div>
        <div onclick="show('pedidos')">🧾 Pedidos</div>
        <div onclick="show('fraudes')">🚨 Fraudes</div>
        <div onclick="show('config')">⚙ Configurações</div>
    </div>

</div>

<!-- MAIN -->
<div class="main">

    <!-- DASHBOARD -->
    <div id="dashboard" class="view active">
        <h2>Dashboard</h2>

        <div class="card">Aprovados: <span id="a">0</span></div>
        <div class="card">Análise: <span id="b">0</span></div>
        <div class="card">Bloqueados: <span id="c">0</span></div>

        <p>Visão geral do sistema antifraude.</p>
    </div>

    <!-- PEDIDOS -->
    <div id="pedidos" class="view">
        <h2>Pedidos</h2>
        <table id="tablePedidos"></table>
    </div>

    <!-- FRAUDES -->
    <div id="fraudes" class="view">
        <h2>Fraudes</h2>
        <table id="tableFraudes"></table>
    </div>

    <!-- CONFIG -->
    <div id="config" class="view">
        <h2>Configurações</h2>
        <p>Sistema ativo ✔</p>
    </div>

</div>

<script>

let dados = [];

function show(id){
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    if(id === "pedidos") carregarPedidos();
    if(id === "fraudes") carregarFraudes();
}

async function load(){
    const res = await fetch("/dashboard");
    dados = await res.json();

    let a=0,b=0,c=0;

    dados.forEach(d=>{
        if(d.status==="aprovado") a++;
        if(d.status==="analise") b++;
        if(d.status==="bloqueado") c++;
    });

    document.getElementById("a").innerText=a;
    document.getElementById("b").innerText=b;
    document.getElementById("c").innerText=c;
}

function carregarPedidos(){
    let html = `
    <tr><th>ID</th><th>Pedido</th><th>Status</th></tr>`;

    dados.forEach(d=>{
        html += `
        <tr>
            <td>${d.id}</td>
            <td>${d.order_id}</td>
            <td>${d.status}</td>
        </tr>`;
    });

    document.getElementById("tablePedidos").innerHTML = html;
}

function carregarFraudes(){
    let html = `
    <tr><th>ID</th><th>Pedido</th><th>Motivo</th></tr>`;

    dados.filter(d=>d.status==="bloqueado").forEach(d=>{
        html += `
        <tr>
            <td>${d.id}</td>
            <td>${d.order_id}</td>
            <td>${d.motivos}</td>
        </tr>`;
    });

    document.getElementById("tableFraudes").innerHTML = html;
}

setInterval(load,3000);
load();

</script>

</body>
</html>
