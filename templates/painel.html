<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Cozinet</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0b0f;
    color:white;
}

/* HEADER SIMPLES */
.header{
    background:#15151c;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid #ff6a00;
}

.logo{
    width:70px;
}

.user{
    background:#1a1a22;
    padding:10px 15px;
    border-radius:10px;
    border:1px solid #ff6a00;
}

/* CONTEÚDO */
.container{
    padding:25px;
}

/* CARDS GRANDES (ESTILO ANTIGO) */
.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    margin-top:20px;
}

.card{
    flex:1;
    min-width:200px;
    background:#1a1a22;
    padding:25px;
    border-radius:15px;
    text-align:center;
    font-size:18px;
    box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.card b{
    display:block;
    font-size:32px;
    margin-top:10px;
}

.aprovado{border-left:5px solid #00ff88;}
.analise{border-left:5px solid #ffb300;}
.bloqueado{border-left:5px solid #ff3b3b;}

/* LISTAS SIMPLES */
.box{
    background:#15151c;
    padding:15px;
    border-radius:10px;
    margin-top:20px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

    <img class="logo" src="https://i.ibb.co/p6D813mT/Cozinet-1.png">

    <h2 style="color:#ff6a00;">Painel Antifraude</h2>

    <div class="user">
        👤 <b>{{ usuario }}</b><br>
        ADMIN
    </div>

</div>

<!-- CONTEÚDO -->
<div class="container">

    <h3>Dashboard</h3>

    <!-- CARDS GRANDES -->
    <div class="cards">

        <div class="card aprovado">
            APROVADOS
            <b id="aprovados">0</b>
        </div>

        <div class="card analise">
            EM ANÁLISE
            <b id="analise">0</b>
        </div>

        <div class="card bloqueado">
            BLOQUEADOS
            <b id="bloqueados">0</b>
        </div>

    </div>

    <!-- LISTAS -->
    <div class="box">
        <h3>Últimos pedidos</h3>
        <div id="listaPedidos">Carregando...</div>
    </div>

</div>

</body>
</html>
