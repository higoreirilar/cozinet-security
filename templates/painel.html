<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Antifraude</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0f;
    color: white;
}

/* HEADER PEQUENO */
header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 15px;
    background: #111117;
    border-bottom: 1px solid #ff6a00;
}

header img {
    width: 40px;
}

header h1 {
    font-size: 14px;
    color: #ff6a00;
    margin: 0;
}

/* MINI STATS (CANTO) */
.stats {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 8px;
}

.box {
    background: #15151c;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    border: 1px solid #333;
}

.aprovado { color: #2cff7a; }
.analise { color: #ffb100; }
.bloqueado { color: #ff3b3b; }

/* CONTAINER */
.container {
    padding: 15px;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    background: #15151c;
    border-radius: 8px;
    overflow: hidden;
    font-size: 13px;
}

th {
    background: #111117;
    color: #ff6a00;
    padding: 8px;
    text-align: left;
}

td {
    padding: 8px;
    border-bottom: 1px solid #222;
}

tr:hover {
    background: #1c1c25;
}

/* TOAST */
#toast {
    position: fixed;
    bottom: 15px;
    right: 15px;
    background: #ff3b3b;
    padding: 10px;
    border-radius: 6px;
    display: none;
    font-size: 12px;
}
</style>
</head>

<body>

<header>
    <img src="https://i.ibb.co/p6D813mT/Cozinet-1.png">
    <h1>ANTIFRAUDE</h1>
</header>

<!-- MINI ESTATÍSTICAS NO CANTO -->
<div class="stats">
    <div class="box">🟢 <span id="aprovados">0</span></div>
    <div class="box">🟡 <span id="analise">0</span></div>
    <div class="box">🔴 <span id="bloqueados">0</span></div>
</div>

<!-- TABELA -->
<div class="container">
<table>
<tr>
<th>ID</th>
<th>Pedido</th>
<th>IP</th>
<th>Valor</th>
<th>Status</th>
<th>Motivo</th>
<th>Data</th>
</tr>

<tbody id="tabela"></tbody>
</table>
</div>

<div id="toast"></div>

<script>
function toast(msg){
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.style.display = "block";
    setTimeout(()=>t.style.display="none",2500);
}

async function atualizar(){
    const res = await fetch("/dashboard");
    const dados = await res.json();

    let a=0,b=0,c=0;
    let html="";

    dados.forEach(d => {

        if(d.status === "aprovado") a++;
        if(d.status === "analise") b++;
        if(d.status === "bloqueado") c++;

        html += `
        <tr>
            <td>${d.id}</td>
            <td>${d.order_id}</td>
            <td>${d.ip}</td>
            <td>R$ ${d.valor}</td>
            <td class="${d.status}">${d.status}</td>
            <td>${d.motivos}</td>
            <td>${d.created_at}</td>
        </tr>`;
    });

    document.getElementById("tabela").innerHTML = html;

    document.getElementById("aprovados").innerText = a;
    document.getElementById("analise").innerText = b;
    document.getElementById("bloqueados").innerText = c;

    if(c > 0){
        toast("🚨 Pedido bloqueado detectado!");
    }
}

setInterval(atualizar,3000);
atualizar();
</script>

</body>
</html>
