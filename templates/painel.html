<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozinet Antifraude System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#070a12;
    color:#fff;
    display:flex;
}

/* SIDEBAR */
.sidebar{
    width:260px;
    height:100vh;
    background:#0c101a;
    border-right:1px solid #1a2233;
    padding:20px;
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo img{
    width:120px;
}

.logo h2{
    color:#ff7a00;
    font-size:14px;
    margin-top:10px;
}

.menu div{
    padding:12px;
    margin:6px 0;
    border-radius:10px;
    cursor:pointer;
    color:#aaa;
    transition:.2s;
}

.menu div:hover{
    background:#141c2a;
    color:#ff7a00;
}

/* MAIN */
.main{
    flex:1;
    padding:25px;
}

/* TOP */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.title{
    font-size:20px;
    color:#ff7a00;
}

.admin-box{
    background:#0f1624;
    padding:12px;
    border-radius:10px;
    border:1px solid #ff7a00;
}

.admin-box a{
    display:inline-block;
    margin-top:5px;
    padding:5px 10px;
    background:#ff3b3b;
    color:white;
    border-radius:6px;
    text-decoration:none;
}

/* CARDS */
.cards{
    display:flex;
    gap:12px;
}

.card{
    flex:1;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

.card h3{
    font-size:30px;
}

.green{background:#123d25;}
.yellow{background:#3d330f;}
.red{background:#3d1212;}

.green h3{color:#00ff88;}
.yellow h3{color:#ffcc00;}
.red h3{color:#ff4d4d;}

/* TABLE */
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:#0f1624;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#111a2a;
    color:#ff7a00;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #1b2436;
}

tr:hover{
    background:#141c2a;
}

.aprovado{color:#00ff88;font-weight:bold;}
.analise{color:#ffcc00;font-weight:bold;}
.bloqueado{color:#ff4d4d;font-weight:bold;}

</style>
</head>

<body>

<div class="sidebar">

    <div class="logo">
        <img src="https://i.ibb.co/p6D813mT/Cozinet-1.png">
        <h2>Cozinet Antifraude</h2>
    </div>

    <div class="menu">
        <div>📊 Dashboard</div>
        <div>🧾 Pedidos</div>
        <div>🚨 Fraudes</div>
        <div>⚙️ Configurações</div>
        <div>👤 Usuários</div>
    </div>

</div>

<div class="main">

    <div class="topbar">

        <div class="title">
            Cozinet Antifraude System
        </div>

        <div class="admin-box">
            👤 <b>{{ usuario }}</b><br>
            <span style="color:#00ff88;">ADMIN LOGADO</span><br>
            <a href="/logout">Sair</a>
        </div>

    </div>

    <div class="cards">
        <div class="card green">
            <h3 id="aprovados">0</h3>
            <p>Aprovados</p>
        </div>

        <div class="card yellow">
            <h3 id="analise">0</h3>
            <p>Análise</p>
        </div>

        <div class="card red">
            <h3 id="bloqueados">0</h3>
            <p>Bloqueados</p>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Pedido</th>
                <th>IP</th>
                <th>Valor</th>
                <th>Status</th>
                <th>Motivos</th>
                <th>Data</th>
            </tr>
        </thead>

        <tbody id="tabela"></tbody>
    </table>

</div>

<script>

async function atualizar(){

    const res = await fetch("/dashboard");
    const dados = await res.json();

    let a=0,b=0,c=0;
    let html="";

    dados.forEach(d=>{

        if(d.status==="aprovado") a++;
        if(d.status==="analise") b++;
        if(d.status==="bloqueado") c++;

        html += `
        <tr>
            <td>${d.id}</td>
            <td>${d.order_id}</td>
            <td>${d.ip}</td>
            <td>R$ ${d.valor}</td>
            <td class="${d.status}">${d.status}</td>
            <td>${d.motivos}</td>
            <td>${d.created_at}</td>
        </tr>`;
    });

    document.getElementById("tabela").innerHTML = html;
    document.getElementById("aprovados").innerText = a;
    document.getElementById("analise").innerText = b;
    document.getElementById("bloqueados").innerText = c;
}

setInterval(atualizar,3000);
atualizar();

</script>

</body>
</html>
